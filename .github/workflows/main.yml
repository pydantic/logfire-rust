name: CI

on:
  push:
    branches:
      - main
  pull_request: {}
  release:
    types: [published]

env:
  # avoid attempting to send logs to logfire from tests
  LOGFIRE_SEND_TO_LOGFIRE: no

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - id: cache-rust
      uses: Swatinem/rust-cache@v2

    - uses: pre-commit/action@v3.0.1
      with:
        extra_args: --all-files --verbose
      env:
        PRE_COMMIT_COLOR: always
        SKIP: test

  resolve:
    runs-on: ubuntu-latest
    outputs:
      MSRV: ${{ steps.resolve-msrv.outputs.MSRV }}
    steps:
      - uses: actions/checkout@v7

      - name: set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: resolve MSRV
        id: resolve-msrv
        run:
          echo MSRV=`python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["rust-version"])'` >> $GITHUB_OUTPUT

  test:
    needs: [resolve]
    name: test rust-${{ matrix.rust-version }}
    strategy:
      fail-fast: false
      matrix:
        rust-version: [stable, nightly]
        include:
          - rust-version: ${{ needs.resolve.outputs.MSRV }}

    runs-on: ubuntu-latest

    env:
      RUST_VERSION: ${{ matrix.rust-version }}

    steps:
    - uses: actions/checkout@v7

    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust-version }}

    - id: cache-rust
      uses: Swatinem/rust-cache@v2

    - run: cargo test --workspace --no-default-features

    - uses: taiki-e/install-action@cargo-llvm-cov

    - run: cargo llvm-cov --workspace --all-features --codecov --output-path codecov.json

    # rust doctests (not included in cargo llvm-cov, see https://github.com/taiki-e/cargo-llvm-cov/issues/2)
    - run: cargo test --workspace --doc

    - uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: codecov.json
        env_vars: RUST_VERSION

  # https://github.com/marketplace/actions/alls-green#why used for branch protection checks
  check:
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  # Publishing a GitHub Release (tag v{version}) runs this once tests/lint pass
  # on the tag. The `release` environment pauses the job for reviewer approval;
  # the crates.io token is minted per-run via OIDC trusted publishing.
  release:
    needs: [check]
    if: "success() && github.event_name == 'release'"
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: rust-lang/crates-io-auth-action@v1
      id: auth
    - run: ./release.sh
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
